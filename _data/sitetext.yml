legal:
    title: "Privacy Policy"
    policy: "Your privacy and security are important to us.<br><br>We do not collect or store any of your personal information unless you directly provide it to us.<br>We do not sell or share any information we collect with any third parties.<br><br>The Reel Reviews website contains an embedded YouTube video, the use of which is subject to Google's [Privacy Policy](https://policies.google.com/privacy). By playing the embedded video, you will be sharing your data with YouTube and Google."
    creditstitle: "Credits"
    creditsbody: "[jekyll-agency theme by Ravi Riley.](https://github.com/raviriley/agency-jekyll-theme)<br>[Header image by Pavel Danilyuk.](https://www.pexels.com/photo/a-man-in-white-long-sleeve-shirt-sipping-a-drink-from-a-cup-7234379/)<br>Timeline images by:<br> - [Thirdman](https://www.pexels.com/photo/businessmen-in-a-business-meeting-5257451/)<br> - [Pavel Danilyuk](https://www.pexels.com/photo/men-discussing-near-a-white-board-in-a-meeting-room-7869318/)<br> - [Mikhail Nilov](https://www.pexels.com/photo/men-sitting-on-a-swivel-chair-having-a-discussion-while-looking-at-the-board-7988748/)<br> - [Dennis Leinarts](https://www.pexels.com/photo/close-up-photography-of-person-using-smartphone-1298473/)<br> - [Joey Theswampboi](https://www.pexels.com/photo/silhouette-of-crowd-people-1486628/)"