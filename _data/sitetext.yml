header:
    title: The only film app you'll ever need.
    text: Reel Reviews.<br>Real People.
    button: Tell Me More
    buttonlink: "#features"

features:
    title: "Features"
    text: "You can do so many things with Reel Reviews:"
    section: features
    list:
      - title: "Search Movies"
        desc: "Find your next favourite film!<br>Search by title, director, and more!"
        icon: fas fa-search
      - title: "Rate Movies"
        desc: "Use up to five stars!<br>That's more than four!"
        icon: fas fa-star       
      - title: "Write Reviews"
        desc: "Convince people you have good taste!<br>We believe you!"
        icon: fas fa-keyboard
      - title: "Edit Reviews"
        desc: "That first draft sucked anyway!<br>Rewrite it!"
        icon: fas fa-pen
      - title: "Delete Reviews"
        desc: "Changed your mind?<br>Toss it!"
        icon: fas fa-trash
      - title: "Built for Android"
        desc: "Write reviews anywhere, anytime!<br>Except in the theatre - put your phone away!"
        icon: fab fa-android

demo:
    title: "Demo Video"
    text: "See Reel Reviews in action!"
    section: demo
    youtubeid: dQw4w9WgXcQ 
    

timeline:
    title: "About Us" 
    text: "Five Guys. One Story."
    section: timeline
    events:
      - title: "Our Humble Beginnings"
        year: "January 2026"
        desc: "Five guys put our heads together to form a project team. Using all of our combined creativity, we called our team Five Guys."
        image: assets/img/timeline/1.jpg
        alt: "Businessmen in a Business Meeting"
        align: left
      - title: "A Project is Born"
        year: "January 2026"
        desc: "Through a grueling and intense brainstorming process, we eventually decided that our project would be to design an Android app for rating and reviewing movies. We would call it Reel Reviews."
        image: assets/img/timeline/2.jpg
        alt: "Men Discussing Near a White Board in a Meeting Room"
        align: right
      - title: "Development Begins"
        year: "February 2026"
        desc: "With our initial planning complete, we put our noses to the grindstone and began turning concepts into code."
        image: assets/img/timeline/3.jpg
        alt: "Men Sitting on a Swivel Chair Having a Discussion while Looking at the Board"
        #align: #default is left       
      - title: "Alpha Releases"
        year: "February-March 2026"
        desc: "The first working versions of Reel Reviews were released."
        image: assets/img/timeline/4.jpg
        alt: "Close-Up Photography of Person Using Smartphone"
        align: right
      - title: "Beta Release"
        year: "April 2026"
        desc: "Reel Reviews is now in beta! Try it now!"
        image: assets/img/timeline/5.jpg
        alt: "Silhouette of Crowd of People"
    end: "Stay <br> Tuned <br> for More!"

