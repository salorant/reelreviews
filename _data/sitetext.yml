vision:
    title: "Our Vision"
    text: "Reel Reviews is a mobile app for people who enjoy movies but are tired of forgetting what they’ve watched or struggling to decide what to watch next.<br><br>It fits naturally into everyday moments—right after leaving the theatre, while sitting on the couch, or while scrolling endlessly through streaming services trying to pick something. Instead of relying on memory or scattered notes, users can quickly log what they’ve watched, rate it, and capture their thoughts while the experience is still fresh. Whether it’s a quick rating or a more detailed review, the app makes it easy to keep track without interrupting the enjoyment of watching movies.<br><br>It also helps with the other side of the experience: remembering what you want to watch. Whether it’s a recommendation from a friend, a trailer you saw online, or a movie you don’t have time for right now, users can save it to a personal wishlist. Instead of losing track of titles or keeping them in random places, everything is stored in one place, ready for when the moment is right.<br><br>Over time, Reel Reviews becomes a personal movie journal. Users can look back on what they’ve seen, rediscover favourites they may have forgotten, and reflect on how their tastes have changed. A movie that once felt average might stand out differently months later, and having that history captured allows users to better understand their own preferences. This turns watching movies into a more intentional and memorable experience rather than something that quickly fades.<br><br>When it comes time to pick something new, Reel Reviews helps reduce the frustration of endless browsing. Instead of jumping between platforms or relying on vague memory, users can revisit their wishlist or explore their past activity by browsing, sorting, and filtering based on what matters to them—whether that’s genre, past ratings, or specific directors. This makes it easier to match a movie to a specific mood, like finding a light comedy after a long day or finally watching something they’ve been meaning to get to.<br><br>Reel Reviews is designed for everyday movie watchers—people who may not consider themselves experts but still watch movies regularly and want a better way to keep track of their experiences. It also supports more dedicated movie fans who enjoy reflecting on what they watch and sharing their thoughts with others. By allowing users to view and write reviews, the app creates a space where different perspectives can be explored, helping users see movies in new ways.<br><br>Ultimately, Reel Reviews is about making the movie-watching experience more personal, organized, and enjoyable. It helps users spend less time trying to remember or decide, and more time actually watching and appreciating films. Instead of movies blending together over time, each one becomes part of a collection of experiences that users can revisit whenever they want."
    section: vision

